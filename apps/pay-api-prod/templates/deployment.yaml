apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "pay-api.fullname" . }}
  labels:
    app.kubernetes.io/name: {{ include "pay-api.name" . }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "pay-api.name" . }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "pay-api.name" . }}
    spec:
      containers:
        - name: pay-api
          image: "{{ .Values.image.repository }}@{{ .Values.image.digest }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.containerPort }}
              name: http
          env:
            - name: APP_VERSION
              value: {{ .Values.env.APP_VERSION | quote }}
            - name: LOG_LEVEL
              value: {{ .Values.env.LOG_LEVEL | quote }}
            - name: OTEL_ENABLED
              value: {{ .Values.env.OTEL_ENABLED | quote }}
            - name: OTEL_SERVICE_NAME
              value: {{ .Values.env.OTEL_SERVICE_NAME | quote }}
            - name: OTEL_EXPORTER_OTLP_TRACES_ENDPOINT
              value: {{ .Values.env.OTEL_EXPORTER_OTLP_TRACES_ENDPOINT | quote }}
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: {{ .Values.env.OTEL_RESOURCE_ATTRIBUTES | quote }}
            - name: OTEL_TRACES_SAMPLER
              value: {{ .Values.env.OTEL_TRACES_SAMPLER | quote }}
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
{{ toYaml .Values.resources | indent 12 }}
