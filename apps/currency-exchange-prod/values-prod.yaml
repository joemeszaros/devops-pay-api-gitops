nameOverride: currency-exchange

replicaCount: 1

image:
  repository: 494313539566.dkr.ecr.eu-central-1.amazonaws.com/pay-api
  digest: sha256:b39c80e0862e8b116b74d9b2beb1a36c9b74c763f30eb3917105db7715918423
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  targetPort: 3100

containerPort: 3100

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 250m
    memory: 256Mi

env:
  APP_VERSION: "0.1.0"
  LOG_LEVEL: info
  OTEL_ENABLED: "true"
  OTEL_SERVICE_NAME: currency-exchange
  OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: http://jaeger.observability.svc.cluster.local:4318/v1/traces
  OTEL_RESOURCE_ATTRIBUTES: deployment.environment=prod,service.namespace=pay-api-demo
  OTEL_TRACES_SAMPLER: parentbased_always_on

hpa:
  enabled: false
  minReplicas: 1
  maxReplicas: 2
  targetCPUUtilizationPercentage: 70
