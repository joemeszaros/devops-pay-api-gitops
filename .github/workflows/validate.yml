name: GitOps Validate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform fmt check
        run: terraform fmt -check -recursive

      - name: Terraform init
        working-directory: terraform/environments/prod
        run: terraform init -backend=false

      - name: Terraform validate
        working-directory: terraform/environments/prod
        run: terraform validate

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Helm lint pay-api
        run: helm lint apps/pay-api-prod

      - name: Helm render pay-api
        run: helm template pay-api apps/pay-api-prod -f apps/pay-api-prod/values-prod.yaml >/tmp/pay-api-rendered.yaml

      - name: Helm lint currency-exchange
        run: helm lint apps/currency-exchange-prod

      - name: Helm render currency-exchange
        run: helm template currency-exchange apps/currency-exchange-prod -f apps/currency-exchange-prod/values-prod.yaml >/tmp/currency-exchange-rendered.yaml
